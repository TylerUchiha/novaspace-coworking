name: Deploy to Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix functions

      - name: Resolve deploy credentials
        id: creds
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "$FIREBASE_TOKEN" ]; then
            echo "method=token" >> "$GITHUB_OUTPUT"
          elif [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "method=service_account" >> "$GITHUB_OUTPUT"
          else
            echo "method=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate with service account
        if: steps.creds.outputs.method == 'service_account'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Skip deploy (no credentials)
        if: steps.creds.outputs.method == 'none'
        run: |
          echo "Skipping deploy: set FIREBASE_TOKEN or FIREBASE_SERVICE_ACCOUNT in GitHub repo secrets."
          echo "Local setup: powershell -File scripts/set-github-firebase-secret.ps1"
          exit 0

      - name: Deploy to Firebase (production)
        if: steps.creds.outputs.method != 'none'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
          VITE_APPCHECK_SITE_KEY: ${{ secrets.VITE_APPCHECK_SITE_KEY }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
        run: bash scripts/deploy-production.sh
