<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova Space — Coworking Planner</title>
    <meta
      name="description"
      content="Book desks, meeting rooms, and coworking spaces with Nova Space. Manage reservations, credits, and branch access in one place."
    />
    <meta name="theme-color" content="#0f172a" />
    <link rel="canonical" href="https://novaspace.work/" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="alternate icon" href="/favicon.ico" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Nova Space" />
    <meta property="og:title" content="Nova Space — Coworking Planner" />
    <meta
      property="og:description"
      content="Book desks, meeting rooms, and coworking spaces with Nova Space."
    />
    <meta property="og:url" content="https://novaspace.work/" />
    <meta property="og:image" content="https://novaspace.work/og-image.svg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nova Space — Coworking Planner" />
    <meta
      name="twitter:description"
      content="Book desks, meeting rooms, and coworking spaces with Nova Space."
    />
    <meta name="twitter:image" content="https://novaspace.work/og-image.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <p
        id="boot-status"
        style="
          margin: 0;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          font-family: Inter, system-ui, sans-serif;
          color: #64748b;
          background: #f8fafc;
        "
      >
        Loading Nova Space…
      </p>
    </div>
    <noscript>
      <p style="font-family: Inter, system-ui, sans-serif; text-align: center; padding: 48px;">
        JavaScript is required to run Nova Space.
      </p>
    </noscript>
    <script>
      (function () {
        var reloadKey = 'nova_asset_reload_v1';
        window.addEventListener(
          'error',
          function (event) {
            var target = event.target;
            if (!target || target.tagName !== 'SCRIPT') return;
            if (sessionStorage.getItem(reloadKey)) return;
            sessionStorage.setItem(reloadKey, '1');
            window.location.reload();
          },
          true
        );
      })();
    </script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
